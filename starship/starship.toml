# Minimal prompt — no emoji, just information
format = """$directory$git_branch$git_status$python$conda$cmd_duration$line_break$character"""

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

[directory]
truncation_length = 0
truncation_symbol = ".../"
truncate_to_repo = false


[git_branch]
format = "[$branch]($style) "
style = "bold purple"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"

[python]
format = '[${pyenv_prefix}${version}( \($virtualenv\))]($style) '
style = "yellow"
symbol = ""

[cmd_duration]
min_time = 2_000
format = "[$duration]($style) "
style = "bold yellow"

[conda]
format = "[$environment]($style) "
style = "green"
symbol = ""
ignore_base = false
